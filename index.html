<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BioCellRx">
    <!-- Performance Hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://player.vimeo.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Enhanced chatbot loader with retry logic
      (function() {
        let retryCount = 0;
        const maxRetries = 3;
        const retryDelay = 2000; // 2 seconds
        
        function loadChatWidget() {
          try {
            const script = document.createElement('script');
            script.src = 'https://widgets.leadconnectorhq.com/loader.js';
            script.setAttribute('data-resources-url', 'https://widgets.leadconnectorhq.com/chat-widget/loader.js');
            script.setAttribute('data-widget-id', '68f3fb5a6c2645482a6ac8b3');
            script.async = true;
            
            script.onerror = function() {
              console.warn('Chat widget failed to load, attempt ' + (retryCount + 1));
              if (retryCount < maxRetries) {
                retryCount++;
                setTimeout(loadChatWidget, retryDelay * retryCount);
              } else {
                console.error('Chat widget failed to load after ' + maxRetries + ' attempts');
              }
            };
            
            script.onload = function() {
              console.log('Chat widget loaded successfully');
            };
            
            document.head.appendChild(script);
          } catch (error) {
            console.error('Error loading chat widget:', error);
          }
        }
        
        // Start loading when DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadChatWidget);
        } else {
          loadChatWidget();
        }
      })();
    </script>
    
    <!-- SEO will be handled by react-helmet-async -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
