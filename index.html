<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BioCellRx">
    <!-- Performance Hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://player.vimeo.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- LeadConnector Performance Optimization -->
    <link rel="preconnect" href="https://widgets.leadconnectorhq.com" crossorigin />
    <link rel="preconnect" href="https://api.leadconnectorhq.com" crossorigin />
    <link rel="dns-prefetch" href="https://widgets.leadconnectorhq.com" />
    <link rel="dns-prefetch" href="https://api.leadconnectorhq.com" />
    <!-- SEO will be handled by react-helmet-async -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- GoHighLevel Chat Widget - Fresh Widget ID -->
    <script 
      src="https://widgets.leadconnectorhq.com/loader.js"  
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" 
      data-widget-id="68f41c1f1e62db5ff1f69320"
      async
      defer
    ></script>
    
    <!-- Force deployment update -->
    
    <!-- Error handling for widget -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('ERR-176082')) {
          console.warn('GoHighLevel widget error (non-critical):', e.message);
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
